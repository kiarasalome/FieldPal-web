<!--
    header.xhtml — equivalente a Navbar.tsx
    ═══════════════════════════════════════════════════════════
    Debe incluirse DENTRO de un <h:form> (lo hace layout.xhtml).
    Usa exclusivamente clases ya definidas en fieldpal.css
    (fp-glass-nav, fp-nav-container, fp-logo-link, fp-nav-links,
    fp-nav-link, fp-nav-actions, fp-theme-toggle, fp-user-menu...)

    Contrato esperado de AuthBean:
      - boolean            isAuthenticated()
      - User               getCurrentUser()   -> getName(), getRole() (PLAYER/ADMIN)
      - String             logout()

    Login (/login) y Registro (/registro) son páginas completas, sin AJAX.

    Enlaces de navegación (GET, sin submit) según el rol:
      - Público   : Inicio, Canchas
      - Jugador   : + Reservar, Mis Reservas
      - Admin     : + Panel Admin
-->
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                xmlns:fn="jakarta.tags.functions">

    <nav class="fp-glass-nav" id="fpNav">
        <div class="fp-nav-container">

            <h:link outcome="/homepage" styleClass="fp-logo-link">
                <span class="fp-logo-icon">
                    <span class="material-symbols-outlined fp-logo-symbol" style="font-variation-settings:'FILL' 1">sports_soccer</span>
                </span>
                <span class="fp-logo-text">FieldPal</span>
                <h:panelGroup rendered="#{authBean.authenticated}">
                    <span class="fp-role-badge #{authBean.currentUser.role == 'ADMIN' ? 'fp-role-admin' : 'fp-role-player'}">
                        #{authBean.currentUser.role == 'ADMIN' ? 'Admin' : 'Jugador'}
                    </span>
                </h:panelGroup>
            </h:link>

            <div class="fp-nav-links">
                <h:link outcome="/homepage" styleClass="fp-nav-link" value="Inicio"/>
                <h:link outcome="/horarios" styleClass="fp-nav-link" value="Canchas"/>
                <h:link outcome="/reserva" styleClass="fp-nav-link" value="Reservar" rendered="#{authBean.authenticated and authBean.currentUser.role != 'ADMIN'}"/>
                <h:link outcome="/mis-reservas" styleClass="fp-nav-link" value="Mis Reservas" rendered="#{authBean.authenticated and authBean.currentUser.role != 'ADMIN'}"/>
                <h:link outcome="/admin/gestion" styleClass="fp-nav-link" value="Panel Admin" rendered="#{authBean.authenticated and authBean.currentUser.role == 'ADMIN'}"/>
            </div>

            <div class="fp-nav-actions">

                <input type="checkbox" id="fpDarkToggle" class="fp-sr-only" aria-label="Cambiar tema"/>
                <label for="fpDarkToggle" class="fp-theme-toggle">
                    <span class="material-symbols-outlined fp-icon-dark">dark_mode</span>
                    <span class="material-symbols-outlined fp-icon-light">light_mode</span>
                </label>

                <h:panelGroup rendered="#{authBean.authenticated}" styleClass="fp-user-menu">
                    <span class="fp-user-avatar">
                        #{fn:toUpperCase(fn:substring(authBean.currentUser.name,0,1))}
                    </span>
                    <span class="fp-user-name">#{authBean.currentUser.name}</span>
                    <!--Boton de update Profile -->
                    <p:commandLink onclick="PF('profileModal').show()"
                                   rendered="#{authBean.player}"
                                   process="@this"
                                   styleClass="fp-btn fp-btn-primary fp-btn-sm"
                                   style="margin-left: 8px; padding: 4px 10px; font-size: 0.75rem; text-transform: none; gap: 4px;">
                        <span class="material-symbols-outlined" style="font-size: 16px;">settings</span>
                        Configurar perfil
                    </p:commandLink>

                    <p:commandButton value="Salir"
                                     icon="pi pi-sign-out"
                                     styleClass="fp-btn fp-btn-outline fp-btn-sm"
                                     action="#{authBean.logout}"
                                     process="@this"
                                     update="appForm"/>
                </h:panelGroup>

                <h:link outcome="/login" styleClass="fp-btn fp-btn-accent fp-btn-sm" rendered="#{not authBean.authenticated}">
                    <span class="material-symbols-outlined" style="font-size:1.125rem;">person</span> Iniciar Sesión
                </h:link>
            </div>
        </div>
    </nav>

</ui:composition>
