<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces"
      lang="es">

<!--
    layout.xhtml
    ═══════════════════════════════════════════════════════════
    Plantilla maestra — equivalente a App.tsx.
    Cada vista (home.xhtml, horarios.xhtml, reserva.xhtml,
    mis-reservas.xhtml, admin/gestion.xhtml) hace:

        <ui:composition template="/templates/layout.xhtml">
            <ui:define name="title">...</ui:define>
            <ui:define name="content">...</ui:define>
        </ui:composition>

    Contrato esperado de bean (no se define aquí, solo se usa):
      - authBean.authenticated (boolean)
-->

<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FieldPal — <ui:insert name="title">Reserva tu cancha</ui:insert></title>

    <h:outputStylesheet library="css" name="fieldpal.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&amp;family=DM+Sans:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;family=JetBrains+Mono:wght@500;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</h:head>

<h:body styleClass="#{authBean.currentUser != null and authBean.currentUser.role == 'ADMIN' ? 'fp-role-admin' : ''}">

    <h:form id="appForm">
        <p:growl id="growl" showDetail="true" life="3500"/>

        <ui:include src="/WEB-INF/templates/fragments/header.xhtml"/>

        <div class="fp-main">
            <ui:insert name="content">Contenido no definido</ui:insert>
        </div>

        <ui:include src="/WEB-INF/templates/fragments/footer.xhtml"/>

        <!-- auth-modal.xhtml (login por AJAX) se retiró: el login ahora es una
             página completa (/login.xhtml, igual que /registro.xhtml) para
             evitar los fallos intermitentes del modal con AJAX + autofill. -->

        <!-- profile-modal.xhtml se retiró temporalmente: nada en el header la abre
             todavía y su bean (profileBean.editingUser) queda null sin sesión,
             lo que rompía CADA página del sitio con un error de servidor.
             Cuando esté lista para usarse, envolver el include así:
             <h:panelGroup rendered="#{authBean.authenticated}">
                 <ui:include src="/profile-modal.xhtml"/>
             </h:panelGroup> -->

        <p:ajaxStatus onstart="PF('globalStatus').show()" onsuccess="PF('globalStatus').hide()" widgetVar="globalStatusEv"/>
        <p:blockUI block="appForm" widgetVar="globalStatus" styleClass="fp-block-ui">
            <span class="material-symbols-outlined fp-spin">progress_activity</span>
        </p:blockUI>

        <h:panelGroup rendered="#{authBean.authenticated}">
            <ui:include src="/WEB-INF/templates/fragments/profile-modal.xhtml"/>
        </h:panelGroup>
        
    </h:form>

</h:body>
</html>
