<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui"
      lang="es">

<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>
        <ui:insert name="title">FieldPal - Reserva de Canchas</ui:insert>
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <h:outputStylesheet library="css" name="fieldpal.css"/>
</h:head>

<h:body styleClass="#{authBean.currentUser != null and authBean.isAdmin() ? 'fp-role-admin' : ''}">

    <p:ajaxStatus onstart="PF('globalStatus').show()" onsuccess="PF('globalStatus').hide()"/>
    <p:blockUI block="pageContainer" widgetVar="globalStatus" styleClass="fp-block-ui">
        <span class="material-symbols-outlined fp-spin" style="font-size: 3rem; color: var(--fp-primary);">progress_activity</span>
    </p:blockUI>

    <h:panelGroup id="pageContainer" layout="block" styleClass="fp-app-layout">

        <ui:insert name="header">
            <ui:include src="/WEB-INF/templates/fragments/header.xhtml" />
        </ui:insert>

        <main class="fp-main-content">
            <h:panelGroup id="content" layout="block" style="padding: 20px; max-width: 1200px; margin: 0 auto;">
                <ui:insert name="content">
                </ui:insert>
            </h:panelGroup>
        </main>

        <ui:insert name="footer">
            <ui:include src="/WEB-INF/templates/fragments/footer.xhtml" />
        </ui:insert>

    </h:panelGroup>

</h:body>
</html>
