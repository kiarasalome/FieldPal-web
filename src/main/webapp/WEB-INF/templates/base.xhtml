<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="primefaces">

<f:view contentType="text/html;charset=UTF-8" encoding="UTF-8">
    <h:head>
        <!-- Título dinámico: cada página puede sobreescribirlo con ui:define name="titulo" -->
        <title><ui:insert name="titulo">FieldPal</ui:insert></title>

        <!-- Fuentes usadas en fieldpal.css -->
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        <!-- Hoja de estilos ya definida con tus colores y componentes -->
        <h:outputStylesheet library="css" name="fieldpal.css"/>
    </h:head>
    <h:body>
        <!-- Notificaciones globales (éxito, error) disponibles en cualquier página -->
        <p:growl id="mensajesGlobales" showDetail="true"/>

        <!-- Contenedor principal envuelto en un panelGroup con id propio.
             Útil si en el futuro necesitas refrescar toda la página vía ajax (update="pageContainer"),
             aunque hoy no lo estemos usando activamente -->
        <h:panelGroup id="pageContainer" layout="block">

            <!-- ═══ HEADER ═══
                 ui:insert con un ui:include por defecto: la mayoría de páginas van a heredar
                 este header automáticamente. Si alguna página necesita otro header (ej: login,
                 o un panel de administrador), puede sobreescribirlo con:
                 <ui:define name="header"> ...otro header... </ui:define> -->
            <ui:insert name="header">
                <ui:include src="fragments/header.xhtml"/>
            </ui:insert>

            <!-- ═══ CONTENIDO ═══
                 panelGroup con id="content" para poder targetear actualizaciones ajax de
                 toda el área de contenido si alguna vez lo necesitas (update="content") -->
            <h:panelGroup id="content" layout="block" styleClass="fp-main">
                <ui:insert name="contenido">
                    <!-- Aquí se inyecta el contenido de cada vista (homepage, misreservas, etc.) -->
                </ui:insert>
            </h:panelGroup>

            <!-- ═══ FOOTER ═══
                 Mismo patrón que el header: por defecto se incluye footer.xhtml, pero
                 cualquier página puede reemplazarlo si es necesario -->
            <ui:insert name="footer">
                <ui:include src="fragments/footer.xhtml"/>
            </ui:insert>

        </h:panelGroup>

        <!-- Modal de login/registro disponible en toda la plataforma -->
        <ui:include src="fragments/auth-modal.xhtml"/>

        <!-- Aplica el modo oscuro guardado por el usuario antes de que la página termine de cargar -->
        <script>
            (function() {
                var temaGuardado = localStorage.getItem('fp-theme');
                if (temaGuardado === 'dark') {
                    document.body.classList.add('dark');
                }
            })();
        </script>
    </h:body>
</f:view>
</html>
