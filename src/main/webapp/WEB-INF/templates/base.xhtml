<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>
        <ui:insert name="title">FieldPal - Reserva de Canchas</ui:insert>
    </title>
</h:head>

<h:body>
    <!-- Contenedor Principal de la Página -->
    <h:panelGroup id="pageContainer" layout="block">

        <!-- Barra de Navegación Superior (Topbar) -->
        <ui:insert name="header">
            <ui:include src="/WEB-INF/templates/fragments/topbar.xhtml" />
        </ui:insert>

        <!-- Separador sutil abajo de la barra -->
        <p:spacer height="15" />

        <!-- Área de Contenido Dinámico -->
        <h:panelGroup id="content" layout="block" style="padding: 10px 20px;">
            <ui:insert name="content">
                <!-- El contenido de cada vista se inyectará aquí -->
            </ui:insert>
        </h:panelGroup>

        <p:spacer height="30" />

        <!-- Pie de Página (Footer) -->
        <ui:insert name="footer">
            <ui:include src="/WEB-INF/templates/fragments/footer.xhtml" />
        </ui:insert>

    </h:panelGroup>
</h:body>
</html>
