<!--
    registro.xhtml — página de registro (independiente, sin AJAX)
    ═══════════════════════════════════════════════════════════
    A pedido explícito: el registro se separó del modal de login
    para eliminar cualquier conflicto de AJAX. El botón usa
    ajax="false", es decir, es un submit de formulario tradicional
    (recarga completa de página + redirección normal de JSF).

    Contrato esperado de AuthBean: ver submitRegister() en AuthBean.java
    (ya trae toda la validación: nombre, email, teléfono, contraseña
    mínima de 6 caracteres y confirmación de contraseña).
-->
<ui:composition template="/WEB-INF/templates/fragments/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces">

    <ui:define name="title">Crear Cuenta</ui:define>

    <ui:define name="content">
        <div class="fp-text-center" style="max-width:28rem;margin:3rem auto 5rem;padding:0 1rem;">

            <div class="fp-modal-icon" style="margin:0 auto 1rem;">
                <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">sports_soccer</span>
            </div>
            <h1 style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.5rem;color:var(--fp-text);margin-bottom:.25rem;">Crear Cuenta</h1>
            <p style="color:var(--fp-text-secondary);margin-bottom:1.5rem;">Regístrate para empezar a reservar canchas en FieldPal</p>

            <p:messages showDetail="true" closable="false" globalOnly="true"/>

            <div class="fp-card fp-card-padded" style="text-align:left;">
                <div class="fp-form-group fp-input-icon-wrapper">
                    <label class="fp-form-label">Nombre completo</label>
                    <span class="fp-input-icon material-symbols-outlined">person</span>
                    <p:inputText value="#{authBean.registerName}" styleClass="fp-input fp-input-icon-field" placeholder="Tu nombre"/>
                </div>
                <div class="fp-form-group fp-input-icon-wrapper">
                    <label class="fp-form-label">Teléfono</label>
                    <span class="fp-input-icon material-symbols-outlined">call</span>
                    <p:inputText value="#{authBean.registerPhone}" styleClass="fp-input fp-input-icon-field" placeholder="+593 99 123 4567"/>
                </div>
                <div class="fp-form-group fp-input-icon-wrapper">
                    <label class="fp-form-label">Correo electrónico</label>
                    <span class="fp-input-icon material-symbols-outlined">mail</span>
                    <p:inputText value="#{authBean.registerEmail}" styleClass="fp-input fp-input-icon-field" placeholder="correo@ejemplo.com"/>
                </div>
                <div class="fp-form-group fp-input-icon-wrapper">
                    <label class="fp-form-label">Contraseña</label>
                    <span class="fp-input-icon material-symbols-outlined">lock</span>
                    <p:password value="#{authBean.registerPassword}" styleClass="fp-input fp-input-icon-field" placeholder="Mínimo 6 caracteres" feedback="false"/>
                </div>
                <div class="fp-form-group fp-input-icon-wrapper">
                    <label class="fp-form-label">Confirmar contraseña</label>
                    <span class="fp-input-icon material-symbols-outlined">lock_reset</span>
                    <p:password value="#{authBean.registerConfirmPassword}" styleClass="fp-input fp-input-icon-field" placeholder="Repite tu contraseña" feedback="false"/>
                </div>

                <div class="fp-form-group">
                    <label class="fp-form-label">Tipo de cuenta</label>
                    <div class="fp-radio-group">
                        <p:selectOneButton value="#{authBean.registerRole}">
                            <f:selectItem itemLabel="Jugador" itemValue="PLAYER"/>
                            <f:selectItem itemLabel="Administrador" itemValue="ADMIN"/>
                        </p:selectOneButton>
                    </div>
                </div>

                <!-- ajax="false": submit tradicional de formulario completo, sin AJAX -->
                <p:commandButton value="Crear Cuenta"
                                 icon="pi pi-user-plus"
                                 styleClass="fp-btn fp-btn-primary fp-btn-full"
                                 action="#{authBean.submitRegister()}"
                                 ajax="false"/>

                <p class="fp-form-switch" style="margin-top:1rem;">
                    ¿Ya tienes cuenta?
                    <h:link outcome="/homepage" value="Inicia sesión"/>
                </p>
            </div>
        </div>
    </ui:define>

</ui:composition>
