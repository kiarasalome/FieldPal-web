<!--
    reserva.xhtml — página de Reserva
    ═══════════════════════════════════════════════════════════
    Contrato esperado de ReservaBean:
      - String   selectedCourtId               -> bindeado desde f:viewParam "courtId"
      - Court    getActiveCourt()               -> name, surface, pricePerHour,
                                                    hasLighting, isCovered, imageUrl,
                                                    type.label / type.emoji / type.icon
      - String   date / hour                    -> get/set
      - int      duration / playerCount         -> get/set
      - String   contactName / contactPhone     -> get/set (autorellenado en @PostConstruct
                                                    desde authBean.currentUser si está logueado)
      - String[] getAvailableHours()
      - double   getTotalPrice() / getPricePerPlayer()
      - String   doReserve()                    -> action, agrega FacesMessage si falla

    Contrato esperado de AuthBean:
      - boolean  isAuthenticated()
      - void     openLogin()

    Contrato esperado de CourtService (bean @Named ya disponible por CDI):
      - List<TimeSlot> getSchedule(String courtId, String date) -> hour, available
-->
<ui:composition template="WEB-INF/templates/fragments/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces">

    <f:metadata>
        <f:viewParam name="courtId" value="#{reservaBean.selectedCourtId}"/>
    </f:metadata>

    <ui:define name="title">Hacer una Reserva</ui:define>

    <ui:define name="content">

        <div class="fp-page-header">
            <div class="fp-page-header-title">
                <span class="material-symbols-outlined">calendar_add_on</span>
                <h1>Mis Reservas</h1>
            </div>
            <p>Visualiza las reservas realizadas</p>
        </div>

        <!-- ═══ SIN SESIÓN: no se puede observar las reservas realizadas sin haber iniciado sesión ═══ -->
        <h:panelGroup rendered="#{not authBean.authenticated}" layout="block" styleClass="fp-text-center" style="padding:4rem 1rem 6rem;">
            <span class="material-symbols-outlined" style="font-size:4rem;color:var(--fp-text-muted);opacity:.25;">lock</span>
            <h2 style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.375rem;color:var(--fp-text);margin:1rem 0 .5rem;">Inicia sesión para observar tus reservas</h2>
            <p style="color:var(--fp-text-secondary);margin-bottom:1.5rem;">Necesitas una cuenta para hacer una reserva.</p>
            <h:link outcome="/login" styleClass="fp-btn fp-btn-primary">
                <span class="material-symbols-outlined" style="font-size:1.125rem;">person</span> Iniciar Sesión
            </h:link>
        </h:panelGroup>


        <!-- ═══ MENU: ═══ -->
       <div class="card">
           <h5>Basic</h5>
           <p:dataTable id="tablaMisReservas" var="reserva" value="#{misReservasBean.reservations}"
                        widgetVar="misreservas" multiViewState="true" rows="10" paginator="true"
                        paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                        rowsPerPageTemplate="5,10,15" selectionMode="single"
                        selection="#{misReservasBean.selectedReservation}" rowKey="#{misReservasBean.selectedReservation.id}"
                        emptyMessage="No se encontaron reservas">

               <f:facet name="header">
                   <p:outputPanel>
                       <h:outputText value="Buscar en todos los campos:"/>
                       <p:inputText id="globalFilter" onkeyup="PrimeFaces.debounce(() => PF('misReservas').filter())"
                                    style="width:150px"
                                    placeholder="Buscar"/>
                   </p:outputPanel>
               </f:facet>

               <p:ajax event="rowSelect" update=":form:reservaInfo" oncomplete="PF('reserva').show()"/>

               <p:column headerText="Name" filterBy="#{misReservasBean.getCourtName(misReservasBean.selectedReservation.id)}" sortBy="#{misReservasBean.}"
                         filterMatchMode="contains">
                   <h:outputText value="#{customer.name}"/>
               </p:column>

               <p:column headerText="Country" filterBy="#{customer.country.name}" sortBy="#{customer.country.name}"
                         filterMatchMode="startsWith">
                   <span class="flag flag-#{customer.country.code}" style="width: 30px; height: 20px"/>
                   <h:outputText style="vertical-align: middle; margin-left: .5rem"
                                 value="#{customer.country.name}"/>
               </p:column>

               <p:column headerText="Representative" filterBy="#{customer.representative.name}"
                         sortBy="#{customer.representative.name}" filterMatchMode="startsWith">
                   <p:graphicImage name="images/avatar/#{customer.representative.image}" library="demo"
                                   width="32" style="vertical-align: middle"/>
                   <h:outputText style="vertical-align: middle; margin-left: .5rem"
                                 value="#{customer.representative.name}"/>
               </p:column>

               <p:column headerText="Status" filterBy="#{customer.status}" sortBy="#{customer.status}"
                         filterMatchMode="exact">
                   <f:facet name="filter">
                       <p:selectOneMenu onchange="PF('customersTable').filter()"
                                        style="width:100%; box-sizing: border-box;">
                           <f:selectItem itemLabel="Select One" itemValue="#{null}" noSelectionOption="true"/>
                           <f:selectItems value="#{dtMultiViewStateView.customerStatus}"/>
                       </p:selectOneMenu>
                   </f:facet>
                   <span class="customer-badge status-#{customer.status.name().toLowerCase()}">#{customer.status}</span>
               </p:column>

               <f:facet name="paginatorTopLeft">
                   <p:commandButton value="Clear table state" action="#{dtMultiViewStateView.clearMultiViewState}"
                                    update="@form"/>
               </f:facet>
           </p:dataTable>
       </div>

   </ui:define>

</ui:composition>
