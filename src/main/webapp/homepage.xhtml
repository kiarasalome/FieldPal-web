<?xml version="1.0" encoding="UTF-8"?>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/templates/base.xhtml">

    <ui:define name="title">
        FieldPal - Tu Cancha al Instante
    </ui:define>

    <ui:define name="content">
        <p:growl id="homeGrowl" showDetail="true" life="3000" />

        <p:card style="text-align: center; margin-bottom: 25px; padding: 20px;">
            <h:outputText value="¡Encuentra y Reserva tu Cancha Ideal!" style="font-size: 2.5rem; font-weight: bold; display: block;" />
            <p:spacer height="10" />
            <h:outputText value="Elige tu deporte favorito, selecciona la hora y asegura tu juego al instante." style="font-size: 1.2rem; color: #666; display: block;" />
            <p:spacer height="20" />

            <p:commandButton value="Reservar Ahora"
                             icon="pi pi-calendar-plus"
                             styleClass="ui-button-raised ui-button-success"
                             style="font-size: 1.2rem; padding: 10px 20px;"
                             rendered="#{not authBean.authenticated}"
                             action="#{authBean.openLogin()}"
                             process="@this"
                             update=":authDialogID"
                             oncomplete="PF('authModal').show()" />

            <p:button value="Ir a Reservar"
                      icon="pi pi-calendar-plus"
                      styleClass="ui-button-raised ui-button-success"
                      style="font-size: 1.2rem; padding: 10px 20px;"
                      rendered="#{authBean.authenticated}"
                      outcome="/reserva" />
        </p:card>

        <p:panel header="Búsqueda Rápida de Disponibilidad" style="margin-bottom: 25px;">
            <p:panelGrid columns="4" layout="flex" styleClass="ui-noborder">
                <h:panelGroup>
                    <p:outputLabel for="deporte" value="Deporte:" style="font-weight: bold; display: block; margin-bottom: 5px;" />
                    <p:selectOneMenu id="deporte" value="#{reservationController.deporte}" style="width: 100%;">
                        <f:selectItem itemLabel="Selecciona un deporte" itemValue="" />
                        <f:selectItem itemLabel="Fútbol" itemValue="futbol" />
                        <f:selectItem itemLabel="Baloncesto" itemValue="basket" />
                        <f:selectItem itemLabel="Tenis" itemValue="tenis" />
                        <f:selectItem itemLabel="Pádel" itemValue="padel" />
                    </p:selectOneMenu>
                </h:panelGroup>

                <h:panelGroup>
                    <p:outputLabel for="fecha" value="Fecha:" style="font-weight: bold; display: block; margin-bottom: 5px;" />
                    <p:datePicker id="fecha" value="#{reservationController.fecha}" showIcon="true" style="width: 100%;" />
                </h:panelGroup>

                <h:panelGroup>
                    <p:outputLabel for="hora" value="Hora:" style="font-weight: bold; display: block; margin-bottom: 5px;" />
                    <p:selectOneMenu id="hora" value="#{reservationController.hora}" style="width: 100%;">
                        <f:selectItem itemLabel="Cualquier hora" itemValue="" />
                        <f:selectItem itemLabel="Mañana (08:00 - 12:00)" itemValue="morning" />
                        <f:selectItem itemLabel="Tarde (12:00 - 18:00)" itemValue="afternoon" />
                        <f:selectItem itemLabel="Noche (18:00 - 22:00)" itemValue="night" />
                    </p:selectOneMenu>
                </h:panelGroup>

                <h:panelGroup>
                    <p:spacer height="25" style="display: block;" />
                    <p:commandButton value="Buscar Canchas"
                                     icon="pi pi-search"
                                     action="#{reservationController.buscarDisponibilidad()}"
                                     process="deporte fecha hora @this"
                                     update="homeGrowl"
                                     styleClass="ui-button-primary"
                                     style="width: 100%;" />
                </h:panelGroup>
            </p:panelGrid>
        </p:panel>

        <p:panelGrid columns="3" layout="flex" styleClass="ui-noborder">
            <p:card style="height: 100%; text-align: center;">
                <i class="pi pi-bolt" style="font-size: 3rem; color: #2196F3; margin-bottom: 15px; display: block;"></i>
                <h:outputText value="Reserva Inmediata" style="font-size: 1.5rem; font-weight: bold; display: block; margin-bottom: 10px;" />
                <h:outputText value="Olvídate de las llamadas telefónicas. Busca horarios libres y confirma tu reserva en segundos." />
            </p:card>

            <p:card style="height: 100%; text-align: center;">
                <i class="pi pi-map-marker" style="font-size: 3rem; color: #4CAF50; margin-bottom: 15px; display: block;"></i>
                <h:outputText value="Las Mejores Sedes" style="font-size: 1.5rem; font-weight: bold; display: block; margin-bottom: 10px;" />
                <h:outputText value="Encuentra complejos deportivos de excelente calidad cerca de tu ubicación actual." />
            </p:card>

            <p:card style="height: 100%; text-align: center;">
                <i class="pi pi-shield" style="font-size: 3rem; color: #FF9800; margin-bottom: 15px; display: block;"></i>
                <h:outputText value="Pago Seguro" style="font-size: 1.5rem; font-weight: bold; display: block; margin-bottom: 10px;" />
                <h:outputText value="Procesos de pago rápidos y seguros, con reembolsos amigables ante cancelaciones." />
            </p:card>
        </p:panelGrid>
    </ui:define>

</ui:composition>
